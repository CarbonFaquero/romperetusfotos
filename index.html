<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title> Para No Verte Más </title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <h1> Romperé tus fotos </h1>

    <div class="frame">

      <div class="photo-container">
        <canvas id="burnCanvas"></canvas>
      </div>

    </div>

    <div class="controls">
      <input type="file" id="upload" accept="image/*" hidden>

      <button id="uploadBtn">SUBIR FOTO</button>

      <button id="resetBtn">REINICIAR</button>

      <button id="btnMusica"> MÚSICA</button>
    </div>

    <p>
      Arrastra tu foto o usa el botón para subirla.
      ¡Pasa el mouse para quemarla!
    </p>

  </div>

  <script src="script.js"></script>
</body>
</html>
